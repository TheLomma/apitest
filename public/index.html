function epPath(ep, id) {
  if (ep === 'get-last')            return '/api/last/' + id;
  if (ep === 'post-thump')          return '/api/thump/' + id;
  if (ep === 'pro-last-deleted')    return '/pro-api/' + id + '/last-deleted';
  if (ep === 'pro-autofill')        return '/pro-api/' + id + '/autofill';
  if (ep === 'live-text')           return '/api/live-text/' + id;
  if (ep === 'pro-last-bd')         return '/pro-api/' + id + '/last-bd';
  if (ep === 'pro-last-deleted-bd') return '/pro-api/' + id + '/last-deleted-bd';
  return '/';
}

async function sendToTelegram(botToken, chatId, text) {
  if (!botToken || !chatId) throw new Error('Bot Token und Chat ID fehlen (Einstellungen pruefen).');
  var res = await fetch('https://api.telegram.org/bot' + botToken + '/sendMessage', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: chatId, text: text })
  });
  var data = await res.json();
  if (!data.ok) throw new Error(data.description || 'Telegram Fehler');
  return data;
}

async function sendToDiscord(webhookUrl, content) {
  if (!webhookUrl) throw new Error('Discord Webhook URL fehlt (Einstellungen pruefen).');
  var res = await fetch(webhookUrl, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: content, username: 'API Tool' })
  });
  if (!res.ok) throw new Error('Discord Fehler: ' + res.status);
  return true;
}

          body: epObj.query ? JSON.stringify({ query: query }) : null
        });
